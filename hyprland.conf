monitor = DP-1,3440x1440@60,1920x0,1
monitor = HDMI-A-1,1920x1080@60,0x360,1

$mainMod = SUPER
$terminal = alacritty
$fileManager = dolphin
$menu = hyprlauncher

exec-once = waybar
#exec-once = hyprpaper
exec-once = waybar
exec-once = ~/.config/waybar/autohide.sh

input {
    kb_layout = pl
    follow_mouse = 1

    touchpad {
        natural_scroll = false
    }
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    layout = dwindle

    col.active_border = rgba(555555ff)
    col.inactive_border = rgba(222222ff)
}

workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:HDMI-A-1

bind = $mainMod, T, exec, $terminal
bind = $mainMod, W, killactive
bind = $mainMod, M, exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, space, exec, $menu
bind = $mainMod, V, togglefloating

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

binde = $mainMod CTRL, left, resizeactive, -50 0
binde = $mainMod CTRL, right, resizeactive, 50 0
binde = $mainMod CTRL, up, resizeactive, 0 -50
binde = $mainMod CTRL, down, resizeactive, 0 50

bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bind = ,Print, exec, grim - | tee ~/Pictures/$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy
bind = SHIFT,Print, exec, grim -g "$(slurp)" - | tee ~/Pictures/$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy
bind = CTRL,Print, exec, grim -g "$(slurp)" - | wl-copy
